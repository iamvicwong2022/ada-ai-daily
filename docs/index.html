<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada AI 日报 — 存档</title>
    <meta name="description" content="Ada AI 日报历史存档 — 为 Builder 精选的 AI 资讯">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a26;
            --border: #2a2a3a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --accent-purple: #8b5cf6;
            --gradient-1: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            line-height: 1.7;
            min-height: 100vh;
        }
        .container { max-width: 620px; margin: 0 auto; padding: 24px 16px 60px; }
        .header {
            text-align: center;
            padding: 40px 0 32px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }
        .header-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .header-icon {
            width: 40px; height: 40px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .header-name {
            font-size: 24px; font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-tagline {
            font-size: 13px; color: var(--text-secondary);
            font-style: italic; opacity: 0.7;
        }
        .issue {
            display: block;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 10px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        .issue:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-purple);
            transform: translateY(-1px);
        }
        .issue-date { font-weight: 600; font-size: 15px; }
        .issue-count { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
        .footer {
            text-align: center; padding-top: 32px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary); font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-brand">
                <div class="header-icon">🧠</div>
                <span class="header-name">Ada AI 日报</span>
            </div>
            <div class="header-tagline">Follow Builders, Not Influencers</div>
        </header>

        <h2 style="font-size: 16px; color: var(--text-secondary); margin-bottom: 16px;">📚 历史日报</h2>

<a class="issue" href="./2026-03-07.html"><div class="issue-date">📰 2026-03-07</div></a>
<a class="issue" href="./2026-03-06.html"><div class="issue-date">📰 2026-03-06</div></a>

        <footer class="footer">
            <p>Ada AI 日报 · 为 Builder 精选的 AI 资讯</p>
        </footer>
    </div>
</body>
</html>
